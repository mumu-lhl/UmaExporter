name: Build and Package

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build (${{ matrix.packager }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        packager: [pyinstaller, nuitka]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev patchelf

    - name: Install UPX (Windows Only)
      if: runner.os == 'Windows'
      run: choco install upx

    - uses: rui314/setup-mold@v1

    - name: Sync Dependencies
      run: uv sync --group dev --python 3.14
      env:
        UV_PYTHON: ${{ env.PYTHON_VERSION }}

    - name: Package
      run: |
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          just package
        else
          just package-nuitka
        fi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PreferredToolArchitecture: x64

    - name: Stage Artifacts
      run: |
        mkdir -p staging/UmaExporter
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          cp -r dist/UmaExporter/* staging/UmaExporter/
        else
          cp -r dist-nuitka/main.dist/* staging/UmaExporter/
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UmaExporter-${{ matrix.packager }}-${{ runner.os }}
        path: staging/
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v4
        id: git-cliff-notes
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Update Persistent Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff-full
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and Push Changelog
        run: |
          # We need to switch back to the main branch to push the updated changelog
          # github.ref_name is the tag name.
          git fetch origin main
          git checkout main
          cp CHANGELOG.md CHANGELOG.md.tmp
          # Ensure we have the latest CHANGELOG.md from main
          git pull origin main
          mv CHANGELOG.md.tmp CHANGELOG.md
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(changelog): update CHANGELOG.md for ${{ github.ref_name }}"
            git push origin main
          else
            echo "No changes in CHANGELOG.md"
          fi
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir release-assets
          for dir in artifacts/*; do
            artifact_name=$(basename "$dir")
            # Create a compressed archive for each artifact
            # If it's Windows, we'll use zip, otherwise tar.gz
            if [[ "$artifact_name" == *"Windows"* ]]; then
              cd "$dir" && zip -r "../../release-assets/${artifact_name}.zip" . && cd -
            else
              tar -czf "release-assets/${artifact_name}.tar.gz" -C "$dir" .
            fi
          done
        shell: bash

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


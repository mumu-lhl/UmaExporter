name: Build and Package

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build (${{ matrix.packager }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        packager: [pyinstaller, nuitka]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev patchelf

    - uses: rui314/setup-mold@v1

    - name: Sync Dependencies
      run: uv sync --group dev --python 3.14
      env:
        UV_PYTHON: ${{ env.PYTHON_VERSION }}

    - name: Package (PyInstaller)
      if: matrix.packager == 'pyinstaller'
      run: just package
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PreferredToolArchitecture: x64

    - name: Prepare Nuitka Environment
      if: matrix.packager == 'nuitka'
      id: nuitka-prep
      run: |
        just build-cython check-as-cli
        
        archspec_path=$(uv run python -c "import archspec, os; print(os.path.dirname(archspec.__file__))")
        echo "archspec_path=$archspec_path" >> $GITHUB_OUTPUT
        
        # Add venv to PATH so Nuitka-Action uses the correct Python and dependencies
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "$PWD/.venv/Scripts" >> $GITHUB_PATH
        else
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
        fi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Package (Nuitka)
      if: matrix.packager == 'nuitka'
      uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: main.py
        mode: standalone
        output-dir: dist-nuitka
        output-file: UmaExporter
        include-package: |
          dearpygui
          f3d
          UnityPy
          fmod_toolkit
          archspec
          astc_encoder
          texture2ddecoder
          etcpak
          pyfmodex
          ctypes
          PIL
          numpy
          apsw
        include-module: |
          ctypes._layout
          src.uma_decryptor
        include-package-data: |
          dearpygui
          f3d
          UnityPy
          fmod_toolkit
        include-data-dir: |
          ${{ steps.nuitka-prep.outputs.archspec_path }}/json=ar
        nofollow-import-to: |
          tkinter
          matplotlib
          unittest
        disable-console: true
        clang: true

    - name: Post-Process Nuitka
      if: matrix.packager == 'nuitka'
      run: |
        # Find the .dist directory (either main.dist or UmaExporter.dist depending on Nuitka version/flags)
        DIST_DIR=$(find dist-nuitka -maxdepth 1 -name "*.dist" | head -n 1)
        echo "Detected Nuitka dist dir: $DIST_DIR"
        
        uv run scripts/copy_dir.py as_cli "$DIST_DIR/as_cli"
        uv run scripts/copy_dir.py README.md "$DIST_DIR/使用说明.txt"
      shell: bash

    - name: Stage Artifacts
      run: |
        mkdir -p staging/UmaExporter
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          cp -r dist/UmaExporter/* staging/UmaExporter/
        else
          DIST_DIR=$(find dist-nuitka -maxdepth 1 -name "*.dist" | head -n 1)
          cp -r "$DIST_DIR"/* staging/UmaExporter/
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UmaExporter-${{ matrix.packager }}-${{ runner.os }}
        path: staging/
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v4
        id: git-cliff-notes
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Update Persistent Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff-full
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and Push Changelog
        run: |
          # We need to switch back to the main branch to push the updated changelog
          # github.ref_name is the tag name.
          git fetch origin main
          git checkout main
          cp CHANGELOG.md CHANGELOG.md.tmp
          # Ensure we have the latest CHANGELOG.md from main
          git pull origin main
          mv CHANGELOG.md.tmp CHANGELOG.md
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(changelog): update CHANGELOG.md for ${{ github.ref_name }}"
            git push origin main
          else
            echo "No changes in CHANGELOG.md"
          fi
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir release-assets
          for dir in artifacts/*; do
            artifact_name=$(basename "$dir")
            # Create a compressed archive for each artifact
            # If it's Windows, we'll use zip, otherwise tar.gz
            if [[ "$artifact_name" == *"Windows"* ]]; then
              cd "$dir" && zip -r "../../release-assets/${artifact_name}.zip" . && cd -
            else
              tar -czf "release-assets/${artifact_name}.tar.gz" -C "$dir" .
            fi
          done
        shell: bash

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


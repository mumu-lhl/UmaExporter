name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (${{ matrix.packager }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        packager: [pyinstaller, nuitka]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev patchelf

    - name: Sync Dependencies
      run: uv sync --group dev

    - name: Package
      run: |
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          just package
        else
          just package-nuitka
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UmaExporter-${{ matrix.packager }}-${{ runner.os }}
        path: |
          dist/UmaExporter/
          dist-nuitka/main.dist/
        if-no-files-found: warn

name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (${{ matrix.packager }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        packager: [pyinstaller, nuitka]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev patchelf

    - name: Install UPX (Windows Only)
      if: runner.os == 'Windows'
      run: choco install upx

    - name: Sync Dependencies
      run: uv sync --group dev

    - name: Cache Nuitka
      if: matrix.packager == 'nuitka'
      uses: actions/cache@v5
      with:
        path: |
          .nuitka-cache
          dist-nuitka/main.build
        key: ${{ runner.os }}-nuitka-${{ hashFiles('**/uv.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-nuitka-${{ hashFiles('**/uv.lock') }}-
          ${{ runner.os }}-nuitka-

    - name: Package
      run: |
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          just package
        else
          just package-nuitka
        fi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        PreferredToolArchitecture: x64

    - name: Stage Artifacts
      run: |
        mkdir -p staging/UmaExporter
        if [ "${{ matrix.packager }}" == "pyinstaller" ]; then
          cp -r dist/UmaExporter/* staging/UmaExporter/
        else
          cp -r dist-nuitka/main.dist/* staging/UmaExporter/
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UmaExporter-${{ matrix.packager }}-${{ runner.os }}
        path: staging/
        if-no-files-found: error

